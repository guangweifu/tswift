name: CI

# Guards the installable package: a clean `pip install .` + the test suite, so a
# missing/renamed dependency or an import-time break is caught before a user hits
# it (e.g. the undeclared-pandas regression). The tests use synthetic data only —
# no MAST/CRDS network access required.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (clean env) + pytest
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest

      - name: Import smoke test
        run: python -c "import tswift; print('tswift', tswift.__version__)"

      - name: Run test suite
        run: pytest tests/ -q
